name: verify

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-all:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-lock.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended lmodern poppler-utils

      - name: Install Python dependencies
        run: python -m pip install -r requirements-lock.txt

      - name: Run maintained checks
        run: bash run_all.sh

      - name: Compile and inspect manuscript
        working-directory: paper
        run: |
          pdflatex -interaction=nonstopmode -halt-on-error main.tex
          pdflatex -interaction=nonstopmode -halt-on-error main.tex
          if grep -E "Overfull \\hbox|Underfull \\hbox|undefined references|Citation .* undefined" main.log; then
            exit 1
          fi
          pdffonts main.pdf | awk 'NR > 2 && ($(NF-4) != "yes" || $(NF-3) != "yes") { print; bad=1 } END { exit bad }'
