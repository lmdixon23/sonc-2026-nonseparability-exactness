name: verify

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  run-all:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends texlive-latex-base poppler-utils zip

      - name: Install Python dependencies
        run: python -m pip install -r requirements-lock.txt

      - name: Run verification suite
        run: bash run_all.sh